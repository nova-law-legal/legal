# 기관 정식명칭 → 약칭 예외표 (override)
#
# 동작 방식:
#   1) 이 표에 "정식명칭"이 있으면 그 약칭을 그대로 사용합니다. (최우선)
#   2) 표에 없으면 transform.py 의 자동 규칙으로 축약합니다.
#        - 경찰서: 광역시/도 접두 제거 + "경찰서"→"서"  (서울강남경찰서 → 강남서)
#        - 법원:   고등법원→고법, 지방법원→지법, 지원은 지원명만 (대전지방법원 → 대전지법)
#        - 검찰:   고등검찰청→고검, 지방검찰청→지검, 지청은 지청명만
#
# 자동 규칙이 어색하게 나오는 기관만 아래에 "정식명칭: 약칭" 한 줄씩 추가하면
# 그 기관은 영구히 교정됩니다. (실제 캘린더에 등장하는 기관 목록을 보며 채워가세요)

# 예시(자동 규칙으로도 동일하게 나오지만 참고용):
# 서울강남경찰서: 강남서
# 춘천지방법원 원주지원: 원주지원
