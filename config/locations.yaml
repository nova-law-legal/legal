# 기관 정식명칭 → 약칭 치환표 (override)
#
# 동작 방식:
#   1) 이 표에 "정식명칭"이 있으면 그 약칭으로 치환합니다.
#   2) 표에 없으면 캘린더 원문(장소)을 그대로 출력합니다. (자동 축약 없음)
#
# ※ 자동 축약 규칙(경찰서→서, 지방법원→지법 등)은 구현하지 않습니다.
#   축약이 필요한 기관은 아래에 "정식명칭: 약칭" 한 줄씩 직접 추가하세요.
#   (실제 캘린더에 등장하는 기관 목록을 보며 채워가면 됩니다.)

# 예시:
# 서울강남경찰서: 강남서
# 춘천지방법원 원주지원: 원주지원

