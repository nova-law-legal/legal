# 송무 팀별 출석변호사 명단
#
# 용도: 오후 '내일 일정' 팀별 알림에서, 다른 팀 사건에 우리 팀 변호사가 '대신 출석'하는
#       경우 그 일정을 우리 팀 알림에도 함께 넣어 팔로우하기 위함.
#       (일정의 출석변호사 — 없으면 담당(변호사) — 가 아래 명단에 있으면 그 팀에 포함)
#
# 주의: 사건의 담당직원 태그(#송무1팀 등)와 별개다. 담당직원 태그는 사건 소속 팀,
#       이 명단은 '실제 출석하는 변호사'의 소속 팀을 가린다.
#
# 수습변호사(신이나·정희소·김윤수·임현진·박건우·정진실·이하영·한충호)는 직접 출석하지
# 않으므로 명단에서 제외한다. 인사이동 시 이 파일만 고치면 전체에 반영된다.

송무1팀: [천기섭, 박정윤, 박준호, 김정아]
송무2팀: [김태환, 김수인]
송무3팀: [채원협, 이종원]
