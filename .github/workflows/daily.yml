name: daily-schedule-notify

on:
  # GitHub Actions의 schedule cron은 정시 보장이 안 되어(혼잡 시 수십 분~수 시간 지연)
  # 외부 스케줄러(cron-job.org 등)가 KST 07:00 정시에 workflow_dispatch 로 트리거한다.
  # 설정 방법: docs/외부-스케줄러-설정.md 참고.
  # 아래 schedule 은 외부 트리거가 실패했을 때를 대비한 '지연 가능 백업'으로 남겨두되,
  # 중복 발송이 우려되면 주석 처리한다. (현재: 외부 트리거 단독 운영을 위해 비활성화)
  # schedule:
  #   - cron: "0 22 * * *"   # UTC 22:00 == KST 07:00 (한국은 서머타임 없음)
  workflow_dispatch: {}   # 외부 스케줄러 + 수동 실행 버튼

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send daily schedule to Discord
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_CALENDAR_ID: ${{ secrets.GOOGLE_CALENDAR_ID }}
          # 두 번째 구글 계정(캘린더 3개)
          GOOGLE_SERVICE_ACCOUNT_JSON_2: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON_2 }}
          GOOGLE_CALENDAR_ID_2: ${{ secrets.GOOGLE_CALENDAR_ID_2 }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python main.py
