name: evening-next-day-teams

on:
  schedule:
    # UTC 08:45 == KST 17:45
    - cron: "45 8 * * *"
  workflow_dispatch: {}   # 수동 실행(테스트) 버튼

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send next-day litigation-team schedule to Discord
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_CALENDAR_ID: ${{ secrets.GOOGLE_CALENDAR_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON_2: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON_2 }}
          GOOGLE_CALENDAR_ID_2: ${{ secrets.GOOGLE_CALENDAR_ID_2 }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          # 팀별 전용 채널 웹훅(없으면 기본 DISCORD_WEBHOOK_URL 로 발송)
          DISCORD_WEBHOOK_URL_SONGMU1: ${{ secrets.DISCORD_WEBHOOK_URL_SONGMU1 }}
          DISCORD_WEBHOOK_URL_SONGMU2: ${{ secrets.DISCORD_WEBHOOK_URL_SONGMU2 }}
          DISCORD_WEBHOOK_URL_SONGMU3: ${{ secrets.DISCORD_WEBHOOK_URL_SONGMU3 }}
        run: python main.py --next-day --teams
