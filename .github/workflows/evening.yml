name: evening-next-day-teams

on:
  # GitHub Actions의 schedule cron은 정시 보장이 안 되어(혼잡 시 수십 분~수 시간 지연)
  # 외부 스케줄러(cron-job.org 등)가 KST 17:30 정시에 workflow_dispatch 로 트리거한다.
  # 설정 방법: docs/외부-스케줄러-설정.md 참고.
  # schedule:
  #   - cron: "30 8 * * *"   # UTC 08:30 == KST 17:30
  workflow_dispatch: {}   # 외부 스케줄러 + 수동 실행 버튼

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send next-day litigation-team schedule to Discord
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_CALENDAR_ID: ${{ secrets.GOOGLE_CALENDAR_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON_2: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON_2 }}
          GOOGLE_CALENDAR_ID_2: ${{ secrets.GOOGLE_CALENDAR_ID_2 }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          # 팀별 전용 채널 웹훅(없으면 기본 DISCORD_WEBHOOK_URL 로 발송)
          DISCORD_WEBHOOK_URL_SONGMU1: ${{ secrets.DISCORD_WEBHOOK_URL_SONGMU1 }}
          DISCORD_WEBHOOK_URL_SONGMU2: ${{ secrets.DISCORD_WEBHOOK_URL_SONGMU2 }}
          DISCORD_WEBHOOK_URL_SONGMU3: ${{ secrets.DISCORD_WEBHOOK_URL_SONGMU3 }}
          DISCORD_WEBHOOK_URL_SANGDAM: ${{ secrets.DISCORD_WEBHOOK_URL_SANGDAM }}
        run: python main.py --next-day --teams
